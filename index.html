<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wink VIP Crack — Control Panel</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --yellow: #d2991d;
            --purple: #7c3aed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Card ─────────────────────── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px 24px;
        }

        /* ── Header ───────────────────── */
        .header { text-align: center; }
        .header .icon { font-size: 44px; display: block; margin-bottom: 4px; }
        .header h1 {
            font-size: 21px; font-weight: 700; letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--purple), #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header .subtitle { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

        /* ── Mode Tabs ────────────────── */
        .mode-tabs {
            display: flex; gap: 6px; margin-top: 14px;
            background: #0d1117; border-radius: 10px; padding: 4px;
        }
        .mode-tab {
            flex: 1; text-align: center; padding: 8px 0; border-radius: 8px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s;
            color: var(--text-dim); border: 1px solid transparent;
        }
        .mode-tab.active {
            background: var(--card); color: var(--text); border-color: var(--border);
        }
        .mode-tab:hover:not(.active) { color: var(--text); }

        /* ── Toggle ───────────────────── */
        .toggle-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 0; border-bottom: 1px solid var(--border);
        }
        .toggle-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .toggle-info .desc { font-size: 12px; color: var(--text-dim); }

        .switch {
            position: relative; width: 54px; height: 30px; flex-shrink: 0;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .switch .slider {
            position: absolute; cursor: pointer; inset: 0;
            background: var(--border); border-radius: 30px; transition: 0.25s;
        }
        .switch .slider::before {
            content: ''; position: absolute; width: 24px; height: 24px;
            left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.25s;
        }
        .switch input:checked + .slider { background: var(--green); box-shadow: 0 0 14px rgba(63,185,80,0.45); }
        .switch input:checked + .slider::before { transform: translateX(24px); }

        /* ── Status ───────────────────── */
        .status-row {
            display: flex; align-items: center; gap: 10px; padding: 14px 0 10px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; transition: 0.3s; }
        .dot.on  { background: var(--green); box-shadow: 0 0 10px rgba(63,185,80,0.7); }
        .dot.off { background: var(--red);  box-shadow: 0 0 10px rgba(248,81,73,0.7); }
        .dot.busy { background: var(--yellow); box-shadow: 0 0 10px rgba(210,153,29,0.7); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .status-text { font-size: 14px; font-weight: 500; }

        /* ── Buttons ──────────────────── */
        .btn-row { display: flex; gap: 10px; margin-top: 2px; }
        .btn {
            flex: 1; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
            background: var(--card); color: var(--text);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn:hover { border-color: #8b949e; background: #1c2129; }
        .btn:active { transform: scale(0.97); }
        .btn.primary { background: var(--purple); border-color: var(--purple); color: #fff; }
        .btn.primary:hover { background: #6d28d9; box-shadow: 0 0 18px rgba(124,58,237,0.45); }
        .btn.warn   { border-color: rgba(248,81,73,0.45); color: var(--red); }
        .btn.warn:hover { background: rgba(248,81,73,0.12); border-color: var(--red); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }

        /* ── Info grid ────────────────── */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
        .info-item {
            background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
        }
        .info-item .lbl { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
        .info-item .val { font-weight: 600; font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 12px; word-break: break-all; }

        /* ── Log ──────────────────────── */
        .log-box {
            margin-top: 10px; background: #0d1117; border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; max-height: 170px; overflow-y: auto;
            font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 11px; line-height: 1.6;
        }
        .log-box .line { padding: 2px 0; border-bottom: 1px solid rgba(48,54,61,0.45); }
        .log-box .ok  { color: var(--green); }
        .log-box .err { color: var(--red); }
        .log-box .inf { color: var(--blue); }
        .log-box .wrn { color: var(--yellow); }
        .log-box .dim { color: var(--text-dim); }

        /* ── Toast ────────────────────── */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 22px; border-radius: 10px; font-size: 13px; font-weight: 700;
            z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
        }
        .toast.show { opacity: 1; }
        .toast.ok  { background: var(--green); color: #000; }
        .toast.err { background: var(--red); color: #fff; }
        .toast.inf { background: var(--blue); color: #000; }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="card">
        <div class="header">
            <span class="icon">🛡️</span>
            <h1>Wink Forever VIP</h1>
            <p class="subtitle">v3.6.1 — by yqc_123 &amp; Hican</p>
        </div>

        <!-- Mode Selector -->
        <div class="mode-tabs">
            <div class="mode-tab active" data-mode="qx" onclick="switchMode('qx')">Quantumult X (MITM)</div>
            <div class="mode-tab" data-mode="ipa" onclick="switchMode('ipa')">IPA Tweak (Injected)</div>
        </div>
    </div>

    <!-- Main Toggle Card -->
    <div class="card">
        <div class="toggle-row">
            <div class="toggle-info">
                <h3 id="toggleLabel">VIP Crack</h3>
                <p class="desc" id="toggleDesc">Đang kiểm tra...</p>
            </div>
            <label class="switch" id="switchWrap">
                <input type="checkbox" id="crackToggle" onchange="onToggle()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="status-row">
            <span class="dot busy" id="dot"></span>
            <span class="status-text" id="statusMsg">Đang khởi tạo...</span>
        </div>

        <div class="btn-row">
            <button class="btn primary" id="btnReset" onclick="resetApp()" disabled>
                🔄 Reset App
            </button>
            <button class="btn warn" id="btnForce" onclick="forceReset()">
                ⚡ Force Reset
            </button>
        </div>
    </div>

    <!-- Info Card -->
    <div class="card">
        <div class="info-grid">
            <div class="info-item">
                <div class="lbl">Chế độ</div>
                <div class="val" id="infoMode">Quantumult X</div>
            </div>
            <div class="info-item">
                <div class="lbl">Trạng thái</div>
                <div class="val" id="infoState">—</div>
            </div>
            <div class="info-item">
                <div class="lbl">Script</div>
                <div class="val" style="font-size:11px;">WinkForeverVipCrack.js</div>
            </div>
            <div class="info-item">
                <div class="lbl">Target</div>
                <div class="val" style="font-size:11px;">api-sub.meitu.com</div>
            </div>
        </div>
    </div>

    <!-- Log -->
    <div class="card">
        <h3 style="font-size:13px;color:var(--text-dim);margin-bottom:6px;">📋 Activity Log</h3>
        <div class="log-box" id="logBox">
            <div class="line inf">Khởi tạo...</div>
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){

// ── State ──────────────────────────────────────
var mode        = 'qx';    // 'qx' | 'ipa'
var enabled     = false;
var connected   = false;
var resetting   = false;
var initDone    = false;

var QX_HOST     = 'http://127.0.0.1:9999';
var QX_PREF_KEY = 'WinkCrack_Enable';    // key for QX MITM script
var IPA_KEY     = 'WinkCrack_Disable';    // key for IPA tweak (NSUserDefaults)
var LOCAL_KEY   = 'wink_crack_state';

// ── DOM ────────────────────────────────────────
var $toggle   = document.getElementById('crackToggle');
var $label    = document.getElementById('toggleLabel');
var $desc     = document.getElementById('toggleDesc');
var $switchW  = document.getElementById('switchWrap');
var $dot      = document.getElementById('dot');
var $status   = document.getElementById('statusMsg');
var $btnReset = document.getElementById('btnReset');
var $btnForce = document.getElementById('btnForce');
var $logBox   = document.getElementById('logBox');
var $toast    = document.getElementById('toast');
var $infoMode = document.getElementById('infoMode');
var $infoState = document.getElementById('infoState');
var $tabs     = document.querySelectorAll('.mode-tab');

// ── Helpers ────────────────────────────────────
function now() {
    return new Date().toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function log(msg, cls) {
    cls = cls || 'dim';
    var el = document.createElement('div');
    el.className = 'line ' + cls;
    el.textContent = '[' + now() + '] ' + msg;
    $logBox.prepend(el);
    while ($logBox.children.length > 60) $logBox.removeChild($logBox.lastChild);
}
var _tt;
function toast(msg, cls) {
    cls = cls || 'inf';
    clearTimeout(_tt);
    $toast.textContent = msg;
    $toast.className = 'toast ' + cls + ' show';
    _tt = setTimeout(function(){ $toast.classList.remove('show'); }, 2500);
}
function sleep(ms) {
    return new Promise(function(r){ setTimeout(r, ms); });
}

// ── UI ─────────────────────────────────────────
function refreshUI() {
    $toggle.checked = enabled;

    if (mode === 'qx') {
        $label.textContent = enabled ? 'VIP Crack — BẬT' : 'VIP Crack — TẮT';
        if (!connected) {
            $dot.className = 'dot busy';
            $status.textContent = 'Chưa kết nối Quantumult X...';
            $switchW.style.opacity = '0.45';
            $switchW.style.pointerEvents = 'none';
        } else {
            $dot.className = enabled ? 'dot on' : 'dot off';
            $status.textContent = enabled ? 'VIP đang hoạt động — Wink FULL VIP' : 'Crack đã TẮT — Wink bản thường';
            $switchW.style.opacity = '1';
            $switchW.style.pointerEvents = 'auto';
        }
    } else {
        // IPA mode — toggle always works
        $dot.className = enabled ? 'dot on' : 'dot off';
        $label.textContent = enabled ? 'Tweak — BẬT' : 'Tweak — TẮT';
        $status.textContent = enabled ? 'Tweak đang inject VIP data' : 'Tweak bị vô hiệu — app chạy thường';
        $switchW.style.opacity = '1';
        $switchW.style.pointerEvents = 'auto';
    }

    $desc.textContent = mode === 'qx'
        ? 'MITM script chặn API vip_info_by_group'
        : 'Tweak hook NSURLSession trong IPA';

    $btnReset.disabled = resetting;
    $btnForce.disabled = resetting;

    $infoMode.textContent  = mode === 'qx' ? 'Quantumult X (MITM)' : 'IPA Tweak (Injected)';
    $infoState.textContent = enabled ? '✅ Đang bật' : '❌ Đang tắt';
}

// ── Mode switch ────────────────────────────────
function switchMode(m) {
    if (m === mode) return;
    mode = m;
    $tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.mode === mode); });

    // Save preference
    localStorage.setItem('wink_panel_mode', mode);

    // Re-init
    if (mode === 'qx') {
        qxInit();
    } else {
        ipaInit();
    }
}
window.switchMode = switchMode;

// ── QX API ─────────────────────────────────────
async function qxFetch(method, path, body) {
    var opts = { method: method, headers: {} };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    var resp = await fetch(QX_HOST + path, opts);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
}

async function qxRead(key) {
    try {
        var data = await qxFetch('GET', '/v1/preferences');
        if (data && data[key] !== undefined) return String(data[key]);
        return null;
    } catch(e) { return null; }
}

async function qxWrite(key, val) {
    try {
        var body = {}; body[key] = val;
        await qxFetch('POST', '/v1/preferences', body);
        return true;
    } catch(e) { return false; }
}

async function qxReload() {
    try { await qxFetch('POST', '/v1/misc/reload'); return true; } catch(e) { return false; }
}

async function qxCheckConn() {
    try { await qxFetch('GET', '/v1/status'); return true; } catch(e) {
        try { await qxFetch('GET', '/v1/preferences'); return true; } catch(e2) { return false; }
    }
}

// ── QX Init ────────────────────────────────────
async function qxInit() {
    log('Chế độ: Quantumult X MITM', 'inf');
    log('Kiểm tra kết nối ' + QX_HOST + '...', 'inf');

    var val = await qxRead(QX_PREF_KEY);
    if (val !== null) {
        enabled   = val !== 'false';
        connected = true;
        log('Đọc QX prefs: WinkCrack_Enable=' + val + ' → ' + (enabled?'BẬT':'TẮT'), 'ok');
    } else {
        // fallback localStorage
        var loc = localStorage.getItem(LOCAL_KEY);
        enabled = loc === null ? true : loc === 'true';
        connected = await qxCheckConn();
        if (!connected) {
            log('Không kết nối được QX — dùng offline (localStorage)', 'wrn');
            log('Mở Quantumult X & bật VPN trên iPhone để đồng bộ', 'wrn');
        } else {
            log('Đã kết nối QX, đọc từ localStorage: ' + (enabled?'BẬT':'TẮT'), 'ok');
            // Đồng bộ ngược vào QX
            await qxWrite(QX_PREF_KEY, String(enabled));
        }
    }
    initDone = true;
    refreshUI();
}

// ── IPA Init ───────────────────────────────────
function ipaInit() {
    log('Chế độ: IPA Tweak (Injected)', 'inf');

    var loc = localStorage.getItem(LOCAL_KEY);
    enabled = loc === null ? true : loc === 'true';
    connected = false; // không cần QX

    log('Trạng thái tweak: ' + (enabled ? 'BẬT (inject VIP data)' : 'TẮT (bypass)'), 'ok');
    log('Tweak dùng key NSUserDefaults: ' + IPA_KEY, 'dim');
    log('Lưu ý: Bật/tắt sẽ cần respring hoặc kill app Wink', 'wrn');

    initDone = true;
    refreshUI();
}

// ── Toggle ─────────────────────────────────────
async function onToggle() {
    var newState = $toggle.checked;

    // Luôn lưu localStorage
    localStorage.setItem(LOCAL_KEY, String(newState));

    if (mode === 'qx') {
        if (connected) {
            var ok = await qxWrite(QX_PREF_KEY, String(newState));
            if (!ok) {
                log('Lỗi ghi QX preferences!', 'err');
                toast('Lỗi đồng bộ Quantumult X', 'err');
                $toggle.checked = enabled;
                refreshUI();
                return;
            }
        }
        enabled = newState;
        log('Đã ' + (enabled?'BẬT':'TẮT') + ' (QX: WinkCrack_Enable=' + String(enabled) + ')', 'ok');
        toast(enabled ? 'VIP Crack BẬT' : 'VIP Crack TẮT', 'ok');

        if (enabled && connected) {
            log('Bật crack → tự động reset...', 'inf');
            await autoResetQX();
        } else if (enabled && !connected) {
            log('Chưa kết nối QX — hãy reset thủ công', 'wrn');
            toast('Hãy tắt/bật VPN trong QX', 'inf');
        }
    } else {
        // IPA mode
        enabled = newState;
        log('Đã ' + (enabled?'BẬT':'TẮT') + ' (IPA tweak: ' + IPA_KEY + '=' + String(!enabled) + ')', 'ok');
        toast(enabled ? 'Tweak BẬT — kill app Wink để áp dụng' : 'Tweak TẮT', 'ok');

        if (enabled) {
            log('Kill app Wink (swipe up) để tweak inject lại VIP', 'wrn');
            toast('⚠️ Kill app Wink ngay để áp dụng', 'wrn');
        }
    }

    refreshUI();
}
window.onToggle = onToggle;

// ── Reset (QX) ─────────────────────────────────
async function autoResetQX() {
    resetting = true; refreshUI();
    $dot.className = 'dot busy';
    $status.textContent = 'Đang reset...';

    var reloadOk = await qxReload();
    if (reloadOk) log('Reload QX config OK', 'ok');

    await sleep(600);

    // Thử restart VPN
    try {
        await qxFetch('POST', '/v1/vpn/restart');
        log('Restart VPN OK', 'ok');
    } catch(e) {
        log('Không restart được VPN (có thể QX phiên bản cũ)', 'wrn');
    }

    await sleep(1800);
    connected  = await qxCheckConn();
    resetting  = false;
    refreshUI();

    if (connected) {
        $dot.className = 'dot on';
        $status.textContent = 'VIP Crack hoạt động — Wink FULL VIP';
        toast('✅ Reset hoàn tất — VIP sẵn sàng', 'ok');
    } else {
        toast('Đợi QX khởi động lại...', 'inf');
    }
}

async function resetApp() {
    if (resetting) return;
    if (!enabled) { toast('Bật crack trước khi reset', 'inf'); return; }

    if (mode === 'qx') {
        if (!connected) { toast('Chưa kết nối QX', 'err'); return; }
        log('Reset theo yêu cầu...', 'inf');
        await autoResetQX();
    } else {
        log('IPA mode: Kill app Wink để áp dụng thay đổi', 'wrn');
        toast('Kill app Wink (swipe up) khỏi app switcher', 'wrn');
    }
}
window.resetApp = resetApp;

async function forceReset() {
    if (resetting) return;
    resetting = true; refreshUI();

    log('⚡ FORCE RESET...', 'wrn');

    if (mode === 'qx') {
        await qxWrite(QX_PREF_KEY, String(enabled));
        await qxReload();
        await sleep(700);
        try { await qxFetch('POST', '/v1/vpn/restart'); } catch(e) {}
        await sleep(2000);
        connected = await qxCheckConn();
    } else {
        // IPA: nhắc kill app
        log('Force reset IPA: kill app Wink + mở lại', 'wrn');
        toast('Kill app Wink ngay!', 'wrn');
        await sleep(3000);
    }

    resetting = false;
    refreshUI();
    log('Force reset done', 'ok');
    toast('Force reset hoàn tất', 'ok');
}
window.forceReset = forceReset;

// ── Startup ────────────────────────────────────
async function boot() {
    log('Wink VIP Control Panel v1.0', 'inf');

    // Đọc mode đã lưu
    var savedMode = localStorage.getItem('wink_panel_mode');
    if (savedMode === 'ipa' || savedMode === 'qx') mode = savedMode;
    $tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.mode === mode); });

    if (mode === 'qx') {
        await qxInit();
    } else {
        ipaInit();
    }

    // Retry QX nếu chưa connect
    if (mode === 'qx' && !connected) {
        setTimeout(async function(){
            if (!connected) {
                var ok = await qxCheckConn();
                if (ok) { connected = true; log('Đã kết nối QX!', 'ok'); refreshUI(); }
            }
        }, 4000);
    }
}

boot();

})();
</script>
</body>
</html>
